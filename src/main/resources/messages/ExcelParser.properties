#Plugin
ExcelParser.pluginLabel=Excel Parser
ExcelParser.pluginDesc=Importe un fichier Excel, le valide et stocke chaque ligne comme enregistrement dans un formulaire/table cible.

#Config - tab 1
ExcelParser.config=Configuration
ExcelParser.invalidId=ID invalide
ExcelParser.label=Libellé
ExcelParser.required=Import obligatoire
ExcelParser.requiredDesc=Bloque la soumission si aucun fichier valide n'a été importé.
ExcelParser.columns=Colonnes / Mapping
ExcelParser.columnsDesc=Associez chaque en-tête Excel à un ID de champ du formulaire cible. Cochez « Requis » pour exiger une valeur, « Clé unique » pour détecter les doublons sur la combinaison de ces colonnes.
ExcelParser.col.excelHeader=En-tête Excel
ExcelParser.col.fieldId=ID du champ (cible)
ExcelParser.col.required=Requis
ExcelParser.col.uniqueKey=Clé unique
ExcelParser.no=Non
ExcelParser.yes=Oui
ExcelParser.caseSensitiveHeaders=En-têtes sensibles à la casse
ExcelParser.caseSensitiveHeadersDesc=Si décoché (par défaut), les en-têtes Excel sont comparés sans tenir compte de la casse.

#Config - tab 2 (storage)
ExcelParser.storage=Stockage des données
ExcelParser.customStorageTarget=Cible de stockage personnalisée
ExcelParser.customStorageTargetDesc=Par défaut, les lignes sont enregistrées dans le formulaire/table courant (celui qui héberge cet élément). Cochez pour choisir une autre cible.
ExcelParser.cibleType=Type de cible
ExcelParser.cibleTypeDesc=Choisissez d'enregistrer dans un autre formulaire ou directement dans une table.
ExcelParser.cibleType.form=Formulaire
ExcelParser.cibleType.table=Nom de table
ExcelParser.targetForm=Formulaire cible
ExcelParser.targetFormDesc=Formulaire (table) dans lequel chaque ligne Excel sera enregistrée.
ExcelParser.tableName=Nom de la table
ExcelParser.tableNameDesc=Nom de la table cible. Le préfixe « app_fd_ » est retiré automatiquement s'il est présent (compatibilité avec les classes Dao).
ExcelParser.parentColumnName=Colonne parent (clé étrangère)
ExcelParser.parentColumnNameDesc=Optionnel. Nom de la colonne de la table cible qui recevra la valeur parent. Laissez vide pour enregistrer des lignes autonomes (sans lien).
ExcelParser.parentColumnValue=Valeur de la colonne parent
ExcelParser.parentColumnValueDesc=Optionnel. Valeur à enregistrer dans la colonne parent (les variables hash sont supportées). Si vide, l'ID de la soumission courante est utilisé.
ExcelParser.deleteExisting=Remplacer les lignes existantes
ExcelParser.deleteExistingDesc=À la soumission, supprime les lignes existantes avant d'enregistrer les nouvelles, selon la stratégie choisie.
ExcelParser.replaceStrategy=Stratégie de remplacement
ExcelParser.replaceStrategyDesc=« Par colonne parent » supprime les lignes liées à la valeur parent. « Par clé(s) unique(s) » supprime les lignes dont la combinaison de clés uniques correspond aux lignes importées.
ExcelParser.replaceStrategy.parentId=Par colonne parent
ExcelParser.replaceStrategy.uniqueKeys=Par clé(s) unique(s)
ExcelParser.checkExistingDuplicates=Vérifier les doublons existants
ExcelParser.checkExistingDuplicatesDesc=Refuse les lignes dont la clé unique existe déjà dans la table cible (hors lignes de la soumission courante).

#Config - tab 3 (UI)
ExcelParser.uiOptions=Options d'affichage
ExcelParser.maxFileSizeMB=Taille max (Mo)
ExcelParser.previewHeight=Hauteur de l'aperçu (px)
ExcelParser.dropzoneText=Texte de la zone de dépôt
ExcelParser.dropzoneTextDefault=Choisir ou déposer un fichier Excel ici
ExcelParser.fullWidth=Pleine largeur
ExcelParser.fullWidthDesc=Affiche la zone de dépôt sur toute la largeur du formulaire (flex 0 0 100%). Décoché : comportement par défaut, comme les autres champs Joget.

#Config - tab 4 (custom messages)
ExcelParser.messagesTab=Messages d'erreur
ExcelParser.msg.required=Fichier obligatoire manquant
ExcelParser.msg.invalidData=Données importées invalides
ExcelParser.msg.missingHeaders=Colonnes manquantes ({0} = liste des colonnes)
ExcelParser.msg.requiredCell=Cellule requise vide ({0} = colonne, {1} = lignes)
ExcelParser.msg.duplicate=Doublons dans le fichier ({0} = clé, {1} = lignes)
ExcelParser.msg.existingDuplicate=Doublons déjà existants ({0} = clé, {1} = lignes)
ExcelParser.msg.emptyFile=Fichier vide
ExcelParser.msg.readError=Erreur de lecture du fichier
ExcelParser.msg.fileTooLarge=Fichier trop volumineux ({0} = taille max)
ExcelParser.msg.rowsValid=Résumé des lignes valides ({0} = valides, {1} = total)

#Validation / runtime messages (shared with the client). {0}/{1} are placeholders.
ExcelParser.err.required=Veuillez importer un fichier Excel valide.
ExcelParser.err.invalidData=Données importées invalides.
ExcelParser.err.missingHeaders=Colonnes manquantes dans le fichier : {0}
ExcelParser.err.requiredCell=Données requises manquantes dans la colonne « {0} » à la/aux ligne(s) : {1}
ExcelParser.err.duplicate=Lignes en double (clé {0}) : {1}
ExcelParser.err.existingDuplicate=Des enregistrements existent déjà (clé {0}) pour la/les ligne(s) : {1}
ExcelParser.err.emptyFile=Le fichier Excel est vide ou ne contient pas de données valides.
ExcelParser.err.readError=Erreur lors de la lecture du fichier Excel.
ExcelParser.err.fileTooLarge=Le fichier dépasse la taille maximale autorisée ({0} Mo).
ExcelParser.info.rowsValid={0} / {1} ligne(s) valides
