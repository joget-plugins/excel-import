ExcelImport.messagesTab=Messages d'erreur
ExcelImport.msg.required=Fichier obligatoire manquant
ExcelImport.msg.invalidData=Données importées invalides
ExcelImport.msg.missingHeaders=Colonnes manquantes ({0} = liste des colonnes)
ExcelImport.msg.requiredCell=Cellule requise vide ({0} = colonne, {1} = lignes)
ExcelImport.msg.duplicate=Doublons dans le fichier ({0} = clé, {1} = lignes)
ExcelImport.msg.existingDuplicate=Doublons déjà existants ({0} = clé, {1} = lignes)
ExcelImport.msg.pattern=Motif non respecté ({0} = colonne, {1} = lignes)
ExcelImport.msg.range=Valeur hors limites ({0} = colonne, {1} = lignes)
ExcelImport.msg.notAllowed=Valeur non autorisée ({0} = colonne, {1} = lignes)
ExcelImport.msg.emptyFile=Fichier vide
ExcelImport.msg.readError=Erreur de lecture du fichier
ExcelImport.msg.fileTooLarge=Fichier trop volumineux ({0} = taille max)
ExcelImport.msg.rowsValid=Résumé des lignes valides ({0} = valides, {1} = total)
ExcelImport.msg.parsing=Message de traitement du fichier
ExcelImport.msg.rendering=Message d'affichage de l'aperçu ({0} = lignes affichées, {1} = total)

