#Plugin
ExcelImport.pluginLabel=Excel Import
ExcelImport.pluginDesc=Importe un fichier Excel ou CSV, le valide et stocke chaque ligne comme enregistrement dans un formulaire/table cible.

#Config - tab 1
ExcelImport.config=Configuration
ExcelImport.invalidId=ID invalide
ExcelImport.label=Libellé
ExcelImport.required=Import obligatoire
ExcelImport.requiredDesc=Bloque la soumission si aucun fichier valide n'a été importé.
ExcelImport.columns=Colonnes / Mapping
ExcelImport.columnsDesc=Associez chaque en-tête Excel à un ID de champ du formulaire cible. Réglez « Requis » sur Oui pour exiger une valeur, « Clé unique » sur Oui pour détecter les doublons sur la combinaison de ces colonnes. Cliquez sur l'icône « Options » d'une ligne pour régler le Type, la Valeur par défaut, le Format de date, les règles de validation (Motif regex, Minimum/Maximum, Valeurs autorisées) et « Masquer dans l'aperçu ». Laissez « ID du champ » vide pour afficher une colonne dans l'aperçu sans l'enregistrer. « Masquer dans l'aperçu » = Oui enregistre une colonne sans l'afficher dans l'aperçu. « Type » convertit et normalise la valeur (Nombre : « 1 234,50 » → « 1234.5 » ; Date : n° de série Excel ou date → format choisi, « yyyy-MM-dd » par défaut ; Booléen : oui/non/1/0… → true/false). « Valeur par défaut » est utilisée quand la cellule est vide. La coercition est appliquée avant enregistrement et validation. Les règles de validation optionnelles ne portent que sur les cellules non vides : « Motif » est une expression régulière (utilisez ^…$ pour une correspondance complète) ; « Minimum »/« Maximum » définissent une plage pour les colonnes de type Nombre ou Date ; « Valeurs autorisées » est une liste (séparée par des virgules) restreignant les valeurs acceptées.
ExcelImport.col.excelHeader=En-tête Excel
ExcelImport.col.fieldId=ID du champ (cible)
ExcelImport.col.type=Type
ExcelImport.col.type.text=Texte
ExcelImport.col.type.number=Nombre
ExcelImport.col.type.date=Date
ExcelImport.col.type.boolean=Booléen
ExcelImport.col.required=Requis
ExcelImport.col.uniqueKey=Clé unique
ExcelImport.col.defaultValue=Valeur par défaut
ExcelImport.col.dateFormat=Format de date
ExcelImport.col.pattern=Motif (regex)
ExcelImport.col.minValue=Minimum
ExcelImport.col.maxValue=Maximum
ExcelImport.col.allowedValues=Valeurs autorisées (séparées par des virgules)
ExcelImport.col.hideInPreview=Masquer dans l'aperçu
ExcelImport.col.options=Options
ExcelImport.col.optionsTitle=Options de la colonne
ExcelImport.col.addRow=Ajouter une colonne
ExcelImport.col.done=Terminé
ExcelImport.col.moveUp=Monter
ExcelImport.col.moveDown=Descendre
ExcelImport.col.delete=Supprimer
ExcelImport.col.noRows=Aucune colonne. Ajoutez-en une pour associer un en-tête Excel à un champ.
ExcelImport.no=Non
ExcelImport.yes=Oui
ExcelImport.caseSensitiveHeaders=En-têtes sensibles à la casse
ExcelImport.caseSensitiveHeadersDesc=Si décoché (par défaut), les en-têtes Excel sont comparés sans tenir compte de la casse.
ExcelImport.csvDelimiter=Séparateur CSV
ExcelImport.csvDelimiterDesc=Uniquement pour les fichiers .csv. Caractère séparateur de colonnes (p. ex. « ; » ou « , »). Saisissez « \\t » ou « tab » pour une tabulation. Laissez vide pour détecter automatiquement.
ExcelImport.csvQuote=Caractère de citation CSV
ExcelImport.csvQuoteDesc=Uniquement pour les fichiers .csv. Caractère entourant les valeurs contenant le séparateur ou un saut de ligne (p. ex. « ' »). Laissez vide pour le guillemet double (") par défaut.

#Config - tab 2 (storage)
ExcelImport.storage=Stockage des données
ExcelImport.disableParentStore=Ne pas enregistrer l'enregistrement du formulaire hôte
ExcelImport.disableParentStoreDesc=Cochez pour empêcher le store binder du formulaire hôte d'enregistrer son propre enregistrement (parent) à la soumission. Seules les lignes Excel seront stockées dans la cible. Utile lorsque le formulaire ne sert qu'à déclencher l'import.
ExcelImport.customStorageTarget=Cible de stockage personnalisée
ExcelImport.customStorageTargetDesc=Par défaut, les lignes sont enregistrées dans le formulaire/table courant (celui qui héberge cet élément). Cochez pour choisir une autre cible.
ExcelImport.cibleType=Type de cible
ExcelImport.cibleTypeDesc=Choisissez d'enregistrer dans un autre formulaire ou directement dans une table.
ExcelImport.cibleType.form=Formulaire
ExcelImport.cibleType.table=Nom de table
ExcelImport.targetForm=Formulaire cible
ExcelImport.targetFormDesc=Formulaire (table) dans lequel chaque ligne Excel sera enregistrée.
ExcelImport.tableName=Nom de la table
ExcelImport.tableNameDesc=Nom de la table cible. Le préfixe « app_fd_ » est retiré automatiquement s'il est présent (compatibilité avec les classes Dao).
ExcelImport.parentColumnName=Colonne parent (clé étrangère)
ExcelImport.parentColumnNameDesc=Optionnel. Nom de la colonne de la table cible qui recevra la valeur parent. Laissez vide pour enregistrer des lignes autonomes (sans lien).
ExcelImport.parentColumnValue=Valeur de la colonne parent
ExcelImport.parentColumnValueDesc=Optionnel. Valeur à enregistrer dans la colonne parent (les variables hash sont supportées). Si vide, l'ID de la soumission courante est utilisé.
ExcelImport.deleteExisting=Remplacer les lignes existantes
ExcelImport.deleteExistingDesc=À la soumission, supprime les lignes existantes avant d'enregistrer les nouvelles, selon la stratégie choisie.
ExcelImport.replaceStrategy=Stratégie de remplacement
ExcelImport.replaceStrategyDesc=« Par colonne parent » supprime les lignes liées à la valeur parent. « Par clé(s) unique(s) » supprime les lignes dont la combinaison de clés uniques correspond aux lignes importées.
ExcelImport.replaceStrategy.parentId=Par colonne parent
ExcelImport.replaceStrategy.uniqueKeys=Par clé(s) unique(s)
ExcelImport.checkExistingDuplicates=Vérifier les doublons existants
ExcelImport.checkExistingDuplicatesDesc=Refuse les lignes dont la clé unique existe déjà dans la table cible (hors lignes de la soumission courante).

#Config - tab 3 (UI)
ExcelImport.uiOptions=Options d'affichage
ExcelImport.maxFileSizeMB=Taille max (Mo)
ExcelImport.hidePreview=Masquer l'aperçu
ExcelImport.hidePreviewDesc=Masque le tableau d'aperçu des données importées. Décoché (par défaut) : l'aperçu est affiché en pleine largeur, sous la zone de dépôt.
ExcelImport.previewHeight=Hauteur de l'aperçu (px)
ExcelImport.dropzoneText=Texte de la zone de dépôt
ExcelImport.dropzoneTextDefault=Choisir ou déposer un fichier Excel ou CSV ici
ExcelImport.fullWidth=Pleine largeur
ExcelImport.fullWidthDesc=Affiche la zone de dépôt sur toute la largeur du formulaire (flex 0 0 100%). Décoché : comportement par défaut, comme les autres champs Joget.

