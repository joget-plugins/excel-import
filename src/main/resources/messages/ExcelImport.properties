ExcelImport.err.required=Veuillez importer un fichier Excel valide.
ExcelImport.err.invalidData=Données importées invalides.
ExcelImport.err.missingHeaders=Colonnes manquantes dans le fichier : {0}
ExcelImport.err.requiredCell=Données requises manquantes dans la colonne « {0} » à la/aux ligne(s) : {1}
ExcelImport.err.duplicate=Lignes en double (clé {0}) : {1}
ExcelImport.err.existingDuplicate=Des enregistrements existent déjà (clé {0}) pour la/les ligne(s) : {1}
ExcelImport.err.pattern=Format invalide dans la colonne « {0} » à la/aux ligne(s) : {1}
ExcelImport.err.range=Valeur hors des limites autorisées dans la colonne « {0} » à la/aux ligne(s) : {1}
ExcelImport.err.notAllowed=Valeur non autorisée dans la colonne « {0} » à la/aux ligne(s) : {1}
ExcelImport.err.emptyFile=Le fichier Excel est vide ou ne contient pas de données valides.
ExcelImport.err.readError=Erreur lors de la lecture du fichier Excel.
ExcelImport.err.fileTooLarge=Le fichier dépasse la taille maximale autorisée ({0} Mo).
ExcelImport.info.rowsValid={0} / {1} ligne(s) valides
ExcelImport.info.parsing=Traitement du fichier…
ExcelImport.info.rendering=Affichage de l'aperçu… {0} / {1}
